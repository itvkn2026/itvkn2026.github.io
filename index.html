<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studentu Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <script>
    const emoji = '🎨';
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.font = '52px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 32, 34);
    const link = document.createElement('link');
    link.rel = 'icon'; link.href = canvas.toDataURL();
    document.head.appendChild(link);
  </script>

  <style>
    :root {
      --bg-page:        #ffffff;
      --text-btn:       #000000;
      --text-btn-hover: #2124d6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "VT323", monospace;
      background: var(--bg-page);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #grid-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 1400px;
    }

    .grid-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      padding: 2rem 2.5rem;
      overflow: hidden;
    }

    .float-name {
      position: fixed;
      font-family: "VT323", monospace;
      font-size: 45px;
      font-weight: 500;
      white-space: nowrap;
      text-decoration: none;
      color: var(--text-btn);
      cursor: pointer;
      user-select: none;
      transform: translate(-50%, -50%);
      transition: color 0.15s;
      z-index: 10;
    }

    .float-name:hover {
      color: var(--text-btn-hover);
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .grid-cell { min-height: 120px; }
    }

    @media (max-width: 500px) {
      .grid { grid-template-columns: 1fr; gap: 0; }
      .grid-cell { min-height: 0; height: calc(100vh / 9); padding: 0; }
    }
  </style>
</head>
<body>

  <div id="grid-container">
    <div class="grid" id="grid">
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
      <div class="grid-cell"></div>
    </div>
  </div>

  <script>
    // ===================== SETTINGS =====================
    const IDLE_TIMEOUT   = 10000;  // ms before screensaver starts

    const USE_WOBBLE     = true;   // Option A: sine-wave drift, feels organic
    const USE_VARIED_SPEED = true; // Option B: each name moves at a different speed

    const SNAP_EASE      = 0.08;   // how fast names ease back to grid (0.01 = very slow, 0.2 = fast)
    // ====================================================

    const students = [
      { name: "Estere Artmane",        url: "https://artmane.github.io/" },
      { name: "Katrīna Līva Dalbiņa",  url: "https://example.com/student2" },
      { name: "Kristers Dzenis",        url: "https://kristersdzenis.net/" },
      { name: "Anna Fogele",            url: "https://annafogele.github.io/" },
      { name: "Malle Kikuste",          url: "https://mallekikuste.github.io/" },
      { name: "Odrija Marta Klēbaha",  url: "https://example.com/student6" },
      { name: "Dana Lozova",            url: "https://danalozova.github.io/" },
      { name: "Ksenija Matvejeva",      url: "https://ksenijamatvejeva.github.io/" },
      { name: "Patrīcija Ņegeļeva",    url: "https://patricijanegeleva.github.io/" },
    ];

    const cells = document.querySelectorAll('.grid-cell');
    let idleTimer  = null;
    let animFrame  = null;
    let snapFrame  = null;
    let isScreensaver = false;
    let floaters   = [];
    let tick       = 0;

    function getResponsiveFontSize() {
      const w = window.innerWidth;
      if (w <= 500) return '18px';
      if (w <= 1100) return '30px';
      return '45px';
    }

    function updateFontSizes() {
      const size = getResponsiveFontSize();
      floaters.forEach(f => { f.el.style.fontSize = size; });
    }

    function getCellCenters() {
      return Array.from(cells).map(cell => {
        const r = cell.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      });
    }

    function buildFloaters() {
      const centers = getCellCenters();
      floaters = students.map((s, i) => {
        const el = document.createElement('a');
        el.textContent = s.name;
        el.href = s.url;
        el.target = '_blank';
        el.rel = 'noopener';
        el.className = 'float-name';

        const cx = centers[i].x;
        const cy = centers[i].y;
        el.style.left = cx + 'px';
        el.style.top  = cy + 'px';
        document.body.appendChild(el);

        // Speed: varied or uniform
        const baseSpeed = USE_VARIED_SPEED
          ? 0.3 + Math.random() * 1.2   // wide range: some slow, some fast
          : 0.7;                          // all the same

        const angle = Math.random() * Math.PI * 2;

        return {
          el,
          x: cx, y: cy,
          homeX: cx, homeY: cy,
          vx: Math.cos(angle) * baseSpeed,
          vy: Math.sin(angle) * baseSpeed,
          baseSpeed,
          // wobble params (Option A)
          wobbleOffset: Math.random() * Math.PI * 2,
          wobbleSpeed:  0.01 + Math.random() * 0.01,
          wobbleAmp:    18 + Math.random() * 18,
          hue:      (i / students.length) * 360,
          hueSpeed: 0.3 + Math.random() * 0.4,
        };
      });
    }

    function resolveCollisions() {
      for (let i = 0; i < floaters.length; i++) {
        for (let j = i + 1; j < floaters.length; j++) {
          const a = floaters[i];
          const b = floaters[j];

          const aw = (a.el.offsetWidth  || 200) / 2;
          const ah = (a.el.offsetHeight || 30)  / 2;
          const bw = (b.el.offsetWidth  || 200) / 2;
          const bh = (b.el.offsetHeight || 30)  / 2;

          const overlapX = (aw + bw) - Math.abs(b.x - a.x);
          const overlapY = (ah + bh) - Math.abs(b.y - a.y);

          if (overlapX > 0 && overlapY > 0) {
            // resolve along the axis of least overlap
            if (overlapX < overlapY) {
              const sign = b.x > a.x ? 1 : -1;
              a.x -= sign * overlapX / 2;
              b.x += sign * overlapX / 2;
              const temp = a.vx;
              a.vx = b.vx;
              b.vx = temp;
            } else {
              const sign = b.y > a.y ? 1 : -1;
              a.y -= sign * overlapY / 2;
              b.y += sign * overlapY / 2;
              const temp = a.vy;
              a.vy = b.vy;
              b.vy = temp;
            }
          }
        }
      }
    }

    function animateFloaters() {
      tick++;
      floaters.forEach(f => {
        f.hue = (f.hue + f.hueSpeed) % 360;

        let moveX = f.vx;
        let moveY = f.vy;

        // Option A: add perpendicular sine wobble
        if (USE_WOBBLE) {
          const angle  = Math.atan2(f.vy, f.vx);
          const perp   = angle + Math.PI / 2;
          const wobble = Math.sin(tick * f.wobbleSpeed + f.wobbleOffset) * f.wobbleAmp * 0.02;
          moveX += Math.cos(perp) * wobble;
          moveY += Math.sin(perp) * wobble;
        }

        f.x += moveX;
        f.y += moveY;

        const hw = (f.el.offsetWidth  || 200) / 2;
        const hh = (f.el.offsetHeight || 30)  / 2;

        if (f.x - hw < 0)                 { f.x = hw;                      f.vx *= -1; }
        if (f.x + hw > window.innerWidth) { f.x = window.innerWidth - hw;  f.vx *= -1; }
        if (f.y - hh < 0)                 { f.y = hh;                      f.vy *= -1; }
        if (f.y + hh > window.innerHeight){ f.y = window.innerHeight - hh; f.vy *= -1; }

        f.el.style.left  = f.x + 'px';
        f.el.style.top   = f.y + 'px';
        f.el.style.color = `hsl(${f.hue}, 90%, 50%)`;
      });

      resolveCollisions();
      animFrame = requestAnimationFrame(animateFloaters);
    }

    function easeToGrid() {
      const centers = getCellCenters();
      let allHome = true;

      floaters.forEach((f, i) => {
        f.homeX = centers[i].x;
        f.homeY = centers[i].y;

        const dx = f.homeX - f.x;
        const dy = f.homeY - f.y;

        f.x += dx * SNAP_EASE;
        f.y += dy * SNAP_EASE;

        f.el.style.left  = f.x + 'px';
        f.el.style.top   = f.y + 'px';
        f.el.style.color = '';

        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
          allHome = false;
        } else {
          f.x = f.homeX;
          f.y = f.homeY;
          f.el.style.left = f.homeX + 'px';
          f.el.style.top  = f.homeY + 'px';
        }
      });

      if (!allHome) {
        snapFrame = requestAnimationFrame(easeToGrid);
      }
    }

    function enterScreensaver() {
      if (isScreensaver) return;
      isScreensaver = true;
      cancelAnimationFrame(snapFrame);
      animateFloaters();
    }

    function exitScreensaver() {
      if (!isScreensaver) return;
      isScreensaver = false;
      cancelAnimationFrame(animFrame);
      easeToGrid();
    }

    function resetTimer() {
      clearTimeout(idleTimer);
      if (isScreensaver) exitScreensaver();
      idleTimer = setTimeout(enterScreensaver, IDLE_TIMEOUT);
    }

    document.addEventListener('mousemove', resetTimer);
    document.addEventListener('touchstart', resetTimer);
    document.addEventListener('keydown', resetTimer);
    window.addEventListener('resize', () => {
      updateFontSizes();
      if (!isScreensaver) {
        const centers = getCellCenters();
        floaters.forEach((f, i) => {
          f.homeX = centers[i].x;
          f.homeY = centers[i].y;
          f.x = f.homeX;
          f.y = f.homeY;
          f.el.style.left = f.x + 'px';
          f.el.style.top  = f.y + 'px';
        });
      }
    });

    buildFloaters();
    updateFontSizes();
    idleTimer = setTimeout(enterScreensaver, IDLE_TIMEOUT);
  </script>

</body>
</html>
